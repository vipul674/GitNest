name: CI — Lint, Test & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Backend: Build & Test
  backend:
    name: Backend (Node/Express)
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || echo "No lint script found"

      - name: Run tests
        run: npm test || echo "No tests found"
        env:
          PORT: 5000
          MONGO_URI: mongodb://localhost:27017/gitnest_test
          JWT_SECRET: ${{ secrets.JWT_SECRET_CI }}
          NODE_ENV: test
# FRONTEND
  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || echo "No lint script found"

      - name: Run tests
        run: npm test -- --run || echo "No tests found"
        env:
          VITE_API_URL: http://localhost:5000/api
          CI: true

      - name: Build for production
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000/api
