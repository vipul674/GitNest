name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "Welcome to GitNest! 🎉 Thank you for opening your first issue here. We will look into this shortly!"
        pr-message: "Thank you for your first Pull Request to GitNest! 🚀 We will review your changes soon. Please make sure you've linked the related issues."
